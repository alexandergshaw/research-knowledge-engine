# data/sample_feeds.yaml
#
# Sample RSS feed catalog mapped to the canonical taxonomy in
# `data/source_categories.yaml`. Each feed specifies a top-level `category` and
# a `subcategory` that MUST exist in the taxonomy (validate with
# validate_subcategory()). `tags` are free-form lookup aliases.
#
# This file is a reference/seed dataset; the live system reads feeds from the
# Supabase `feeds` table, not this file.

feeds:
