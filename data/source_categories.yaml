# data/source_categories.yaml
#
# Canonical category taxonomy for the Research Knowledge Engine and all sibling
# projects (Personal Knowledge Base, Classroom Artifact Grader, Course Generator,
# Workflow Automation Platform, Resume Tailoring Engine).
#
# Conventions:
#   - All category and subcategory names use kebab-case.
#   - Top-level categories are intentionally broad and stable (5+ year horizon).
#   - Avoid company-specific or technology-specific categories here; those belong
#     in `tags` on individual sources/feeds, not in the taxonomy.
#
# Schema (per category):
#   <category-name>:
#     name:          Human-readable display name.
#     description:   One-sentence description of the category's scope.
#     tags:          Synonyms / lookup aliases used by find_category_by_tag().
#     subcategories: Stable, broad sub-topics (kebab-case).

categories:
  software:
    name: Software
    description: Software engineering and development topics.
    tags:
      - software
      - programming
      - engineering
      - development
      - dev
    subcategories:
      - frontend
      - backend
      - cloud
      - devops
      - testing
      - architecture
      - programming-languages
      - open-source
      - web-development
      - distributed-systems

  computer-science:
