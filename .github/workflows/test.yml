name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# TODO: Implement full test matrix when Phase 2+ begins.
# Currently runs the Phase 1 Python test suite.

jobs:
  test-python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python3 -m pytest -q

  # TODO: Add test-typescript job for apps/web when Phase 5 begins
