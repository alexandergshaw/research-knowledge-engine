name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# TODO: Implement lint jobs when Phase 5 (Next.js) and Phase 4 (worker) begin.
# Skeleton structure only.

jobs:
  lint-python:
    name: Python lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # TODO: Add ruff or flake8 lint step

  lint-typescript:
    name: TypeScript lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      # TODO: Add ESLint step for apps/web
